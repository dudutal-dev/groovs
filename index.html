<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f1e;--card:#111827;--card2:#1a2540;--card3:#1e2d4a;
  --border:rgba(99,179,237,.14);--borderH:rgba(99,179,237,.32);
  --sky:#60a5fa;--skyd:#3b82f6;--skyDeep:#1d4ed8;
  --green:#34d399;--greenD:#059669;
  --amber:#fbbf24;--amberD:#d97706;
  --rose:#f87171;--roseD:#dc2626;
  --purple:#c084fc;--gold:#e2b96a;
  --text:#f1f5f9;--text2:#cbd5e1;--sub:#94a3b8;--muted:#475569;
  --sbot:env(safe-area-inset-bottom,0px);--stom:env(safe-area-inset-top,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rubik',sans-serif;direction:rtl;font-size:16px;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;max-width:540px;margin:0 auto;background:var(--bg)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(70px + var(--sbot))}
::-webkit-scrollbar{display:none}
input,textarea,select{font-family:'Rubik',sans-serif;font-size:16px;-webkit-appearance:none;appearance:none}
input[type=date]{color-scheme:dark}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1rem 1.1rem;position:relative;overflow:hidden}
.card.sky{border-right:4px solid var(--sky)}.card.gold{border-right:4px solid var(--gold)}
.card.green{border-right:4px solid var(--green)}.card.amber{border-right:4px solid var(--amber)}
.card.rose{border-right:4px solid var(--rose)}.card.purple{border-right:4px solid var(--purple)}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:30px;font-size:12px;font-weight:600;gap:4px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:13px;padding:13px 18px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;min-height:50px;border:1.5px solid transparent;transition:opacity .12s,transform .1s;width:100%;background:transparent;letter-spacing:.1px}
.btn:active{opacity:.72;transform:scale(.98)}.btn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.p{background:linear-gradient(135deg,var(--skyd),var(--skyDeep));color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(59,130,246,.3)}
.g{color:var(--sub);border-color:var(--border)}.s{background:rgba(52,211,153,.16);color:var(--green);border-color:rgba(52,211,153,.38)}
.d{background:rgba(248,113,113,.14);color:var(--rose);border-color:rgba(248,113,113,.28)}.k{background:rgba(96,165,250,.16);color:var(--sky);border-color:rgba(96,165,250,.38)}
.go{background:rgba(226,185,106,.14);color:var(--gold);border-color:rgba(226,185,106,.38)}
/* FIELDS */
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:13px;color:var(--sub);font-weight:500}
.fld input,.fld textarea,.fld select{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:13px;padding:14px 15px;color:var(--text);font-size:15px;direction:rtl;outline:none;font-family:inherit;transition:border-color .15s}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--sky)}
.fld textarea{resize:vertical;line-height:1.6}
/* ANIMATIONS */
.fade{animation:fd .22s ease}@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.pop{animation:pp .18s ease}@keyframes pp{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--sky);animation:dp 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.18s}.dots span:nth-child(3){animation-delay:.36s}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.75)}40%{opacity:1;transform:scale(1)}}
.pulse{animation:pls 2s infinite}@keyframes pls{0%,100%{opacity:1}50%{opacity:.45}}
/* NAV */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;z-index:300;background:rgba(17,24,39,.95);border-top:1px solid var(--border);display:flex;padding-bottom:max(8px,var(--sbot));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;padding:8px 0;min-height:58px;position:relative;font-family:inherit;transition:opacity .12s}
nav button:active{opacity:.6}
.ndot{position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:3px;background:var(--sky);border-radius:0 0 4px 4px}
/* CHAT */
.mw{display:flex;gap:10px;align-items:flex-start}
.mw.u{flex-direction:row}.mw.a{flex-direction:row-reverse}
.av{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.av.u{background:var(--card2)}.av.a{background:linear-gradient(135deg,#2563eb,#1e40af)}
.bub{max-width:82%;padding:12px 14px;border:1px solid var(--border);font-size:15px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.bub.u{background:var(--card2);border-radius:16px 16px 4px 16px}
.bub.a{background:var(--card);border-radius:16px 16px 16px 4px;border-right:3px solid var(--sky)}
.bub.em{color:var(--rose);border-color:rgba(248,113,113,.3)}
.mt{font-size:11px;color:var(--muted);margin-top:5px;text-align:left}
.chip{padding:8px 16px;border-radius:24px;border:1.5px solid var(--border);background:var(--card2);color:var(--sub);font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s}
.chip:active{background:var(--card3);border-color:var(--sky);color:var(--sky)}
/* INPUT */
.ibar{padding:.65rem 1rem .75rem;background:rgba(17,24,39,.97);border-top:1px solid var(--border);flex-shrink:0;backdrop-filter:blur(20px)}
.iwrap{display:flex;gap:8px;align-items:flex-end;background:var(--card2);border-radius:16px;border:1.5px solid var(--border);padding:8px 8px 8px 14px;transition:border-color .15s}
.iwrap:focus-within{border-color:rgba(96,165,250,.4)}
.iwrap textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;line-height:1.6;resize:none;max-height:110px;overflow-y:auto;direction:rtl;padding:4px 0;font-family:inherit}
.iico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;border:1.5px solid transparent;background:transparent;transition:all .15s}
.iico:active{transform:scale(.9)}
.iico.at{background:rgba(96,165,250,.14);border-color:rgba(96,165,250,.28)}
.iico.sn{background:linear-gradient(135deg,#2563eb,#1e40af);border-color:transparent;box-shadow:0 3px 12px rgba(59,130,246,.35)}
.iico.sn:disabled{background:var(--card3);border-color:var(--border);box-shadow:none}
.dis{font-size:11px;color:var(--muted);text-align:center;margin-top:5px}
/* INNER TABS */
.tb{display:flex;background:var(--card2);border-radius:14px;padding:4px;margin-bottom:14px;gap:3px}
.tb button{flex:1;padding:10px 2px;border-radius:11px;border:none;font-family:inherit;cursor:pointer;font-size:12.5px;transition:all .18s;font-weight:400;color:var(--muted)}
.tb button.act{background:var(--card);color:var(--sky);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.3)}
/* TRACKER */
.trd{display:flex;gap:4px}
.trdb{flex:1;height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:1.5px solid var(--border);background:var(--card2);font-family:inherit;transition:all .15s}
.trdb:active{transform:scale(.9)}.trdb.tk{background:rgba(52,211,153,.2);border-color:var(--green)}
/* TOAST */
#toast{position:fixed;bottom:calc(80px + var(--sbot));left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,45,74,.95);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;backdrop-filter:blur(20px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;padding:0;backdrop-filter:blur(8px)}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:540px;margin:0 auto;padding:1.5rem 1.2rem calc(1.5rem + var(--sbot));max-height:85dvh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 1.2rem;display:block}
/* SECTION HEADER */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:.9rem}
.sh-bar{width:4px;height:20px;border-radius:4px}
.sh h3{font-size:16px;font-weight:600;color:var(--text)}
/* DOCUMENTS */
.doc-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .15s}
.doc-thumb{width:100%;height:160px;background:var(--card2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.doc-thumb canvas{width:100%;height:100%;object-fit:contain}
.doc-thumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in}
.doc-thumb .pdf-icon{font-size:48px;opacity:.5}
.doc-category{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.doc-actions{display:flex;gap:6px;padding:.75rem}
/* INSTALL BANNER *//* INSTALL BANNER */
.install-banner{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(29,78,216,.1));border:1px solid rgba(96,165,250,.3);border-radius:16px;padding:1rem 1.1rem;margin-bottom:1.2rem;cursor:pointer;display:flex;align-items:center;gap:12px}
</style>

<script>
// ── CONFIG ──
const KEY="drc_v2",API="https://api.anthropic.com/v1/messages";
const EMRG=["כאב חזה","קוצר נשימה","שבץ","עילפון","דימום חמור","אוטם לב"];
const CHIPS=["כאב ראש","חום","שיעול","כאב גרון","כאב בטן","חולשה","סחרחורת","בחילה","פריחה","כאב גב","קוצר נשימה","כאב שרירים","נדודי שינה","כאב אוזניים"];
const MODEL="claude-haiku-4-5-20251001";

const SYS=`אתה ד"ר קלוד — רופא משפחה דיגיטלי בעל ניסיון של 25 שנה וידע קליני מקיף מספרות הרפואה המערבית: Harrison's Principles of Internal Medicine, DSM-5-TR, Nelson's Pediatrics, Fitzpatrick's Dermatology, Schwartz's Surgery, Goodman & Gilman's Pharmacology, Sabiston Surgery, Williams Obstetrics, UpToDate.

כישורים:
• אבחנה מבדלת מסודרת לפי תסמינים, גיל, מין ורקע רפואי
• ניתוח תמונות רפואיות: עור, גרון, עין, פריחה, פצע, תוצאות בדיקות מעבדה והדמיה
• הבנת פרמקולוגיה ואינטראקציות תרופתיות
• רפואה פנימית, ילדים, נשים, נוירולוגיה, אורתופדיה, עור

כלל עבודה:
1. אסוף 3-5 שאלות ממוקדות לפני כל אבחנה
2. שאל על גיל, מין, מחלות רקע בפגישה ראשונה
3. הצג אבחנה מבדלת מהסבירה לפחות סבירה

פורמט אבחנה קליני:
━━━━━━━━━━━━━━━━━━━━━━
🩺 סיכום קליני — ד"ר קלוד
━━━━━━━━━━━━━━━━━━━━━━
📌 תלונה עיקרית: [תיאור]
🔬 הערכה קלינית:
  ⭐ [אבחנה ראשית] — [הסבר בשפה פשוטה]
  • [אבחנה 2] — [סיבה]
  • [אבחנה 3] — [סיבה]
💊 המלצות טיפול: [ביתי / תרופות / שינויים]
📝 בדיקות מומלצות: [רשימה]
🚦 דחיפות: 🟢 לא דחוף / 🟡 תוך 2-3 ימים / 🔴 דחוף
━━━━━━━━━━━━━━━━━━━━━━
⚠️ הערכה ראשונית בלבד — אינה מחליפה ביקור אצל רופא מוסמך

כשמנתח תמונת בדיקה (מעבדה/הדמיה):
📊 ניתוח תוצאות:
  • [פרמטר]: [ערך] — [משמעות קלינית]
📌 ממצא עיקרי: [הסבר]
💡 המלצה: [פעולה מומלצת]

לחירום: 🚨 זהו מצב חירום! התקשר מיד ל-101 (מד"א). אל תחכה!
תמיד בעברית. חם ואמפתי.`;

const SYS_SUM=`צור סיכום רפואי מקצועי ומקיף בעברית על סמך המידע שסופק:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📋 סיכום תיק רפואי — ד"ר קלוד
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
👤 מטופל: [שם, גיל, מין, סוג דם, עישון]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🏥 מחלות רקע פעילות:
  [רשימה מסודרת עם פירוט]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
💊 טיפול תרופתי נוכחי:
  [תרופה — מינון — מטרה]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ אלרגיות ורגישויות: [רשימה]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🧪 בדיקות אחרונות — ממצאים עיקריים:
  [ניתוח תמונות בדיקות שהועלו + פירוש ערכים]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🔍 נקודות תשומת לב קלינית:
  [אינטראקציות תרופות, סיכונים, ממצאים חריגים]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📅 המלצות מעקב:
  [בדיקות שחסרות, מומחים לפנות, תדירות ביקורות]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ סיכום זה אינו מחליף הערכה רפואית מקצועית`;

// ── STATE ──
let S={
  view:"home", consults:[], profile:{}, activeId:null,
  hSel:null, hTab:"dx",
  ci:"", cf:[], cp:[], cld:false,
  ft:"profile", gl:false,
  sk:localStorage.getItem("dr_apikey")||"",
  ss:null, sld:false, sShow:false,
  nt:{name:"",date:"",notes:""},
  nm:{name:"",dose:"",freq:"",duration:""},
  ntst:{name:"",date:"",notes:""},
  nf:{date:"",note:""},
  dx:{diagnosis:"",notes:""},
  modal:null,
};

// ── PERSISTENCE ──
function loadS(){try{const r=localStorage.getItem(KEY);if(r){const d=JSON.parse(r);S.consults=d.c||[];S.profile=d.p||{};S.activeId=d.a||null;}}catch{}}
function saveS(){try{localStorage.setItem(KEY,JSON.stringify({c:S.consults,p:S.profile,a:S.activeId}));}catch{}}
setInterval(saveS,12000);
window.addEventListener("beforeunload",saveS);
window.addEventListener("visibilitychange",()=>{if(document.hidden)saveS();});

// ── UTILS ──
const uid=()=>Math.random().toString(36).slice(2,10);
const fD=d=>new Date(d).toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit",year:"numeric"});
const fT=d=>new Date(d).toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
const d7=()=>{const a=[];for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);a.push(x.toISOString().slice(0,10));}return a;};
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");

function toast(msg,dur=2400){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),dur);
}

function copyText(txt){
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast("✅ הועתק ללוח!")).catch(()=>legacyCopy(txt));}
  else legacyCopy(txt);
}
function legacyCopy(txt){
  const ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;opacity:0";
  document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("✅ הועתק!");}catch{}document.body.removeChild(ta);
}

function shareOrCopy(title,text){
  if(navigator.share){navigator.share({title,text}).catch(()=>copyText(text));}
  else copyText(text);
}

// ── API ──
async function ai(msgs,sys=SYS){
  const key=localStorage.getItem("dr_apikey")||"";
  if(!key)throw new Error("NO_KEY");
  const am=msgs.map(m=>{
    if(m.role==="user"&&m.files?.length){
      const ct=[];
      m.files.forEach(f=>{
        if(f.type?.startsWith("image/"))
          ct.push({type:"image",source:{type:"base64",media_type:f.type,data:f.data}});
        else if(f.type==="application/pdf")
          ct.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:f.data}});
      });
      ct.push({type:"text",text:m.content||"קרא ונתח את המסמכים המצורפים בעברית"});
      return{role:"user",content:ct};
    }
    return{role:m.role,content:m.content};
  });
  const r=await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:MODEL,max_tokens:1500,system:sys,messages:am})
  });
  const raw=await r.text();
  let d;try{d=JSON.parse(raw);}catch{throw new Error("תגובה לא תקינה מהשרת ("+r.status+")");}
  if(!r.ok||d.error)throw new Error(d.error?.message||"שגיאת API "+r.status);
  return d.content?.[0]?.text||"תשובה ריקה";
}

// Render PDF first page to canvas thumbnail
async function renderPdfThumb(b64data){
  try{
    const bin=atob(b64data);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    const pdf=await pdfjsLib.getDocument({data:arr}).promise;
    const page=await pdf.getPage(1);
    const vp=page.getViewport({scale:1.2});
    const canvas=document.createElement("canvas");
    canvas.width=vp.width;canvas.height=vp.height;
    const ctx=canvas.getContext("2d");
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    return{thumbDataUrl:canvas.toDataURL("image/jpeg",0.7),pageCount:pdf.numPages};
  }catch{return{thumbDataUrl:null,pageCount:null};}
}

      const {thumbDataUrl,pageCount}=await renderPdfThumb(b64);

};

// Load PDF in modal viewer
async function loadPdfInModal(b64,pageNum){
  try{
    if(!S._pdfDoc){
      const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
      S._pdfDoc=await pdfjsLib.getDocument({data:arr}).promise;
    }
    const pdf=S._pdfDoc;S._pdfPage=pageNum;
    const page=await pdf.getPage(pageNum);
    const vp=page.getViewport({scale:1.5});
    const canvas=document.getElementById("pdf-viewer-canvas");if(!canvas)return;
    canvas.width=vp.width;canvas.height=vp.height;
    canvas.style.maxHeight="58dvh";canvas.style.width="100%";
    await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
    const info=document.getElementById("pdf-page-info");if(info)info.textContent=`עמ' ${pageNum} מתוך ${pdf.numPages}`;
    const prev=document.getElementById("pdf-prev");if(prev)prev.disabled=(pageNum<=1);
    const next=document.getElementById("pdf-next");if(next)next.disabled=(pageNum>=pdf.numPages);
  }catch(e){console.error("PDF render:",e);}
}

window.pdfPage=async delta=>{
  const docs=S.profile.medDocs||[];const doc=docs.find(d=>S.modal?.title?.includes(esc(d.name)));
  if(!doc)return;
  await loadPdfInModal(doc.data,S._pdfPage+delta);
};

// Send doc to chat for analysis
window.sendDocToChat=async idx=>{
  const docs=S.profile.medDocs||[];const doc=docs[idx];if(!doc)return;
  S.view="consult";
  if(!S.consults.find(c=>c.id===S.activeId))newC();
  const c=S.consults.find(x=>x.id===S.activeId);if(!c)return;
  const um={id:uid(),role:"user",content:`יש לי מסמך רפואי לניתוח: "${doc.name}". אנא קרא ונתח אותו.`,files:[{type:doc.type,data:doc.data,name:doc.name}],ts:Date.now()};
  c.messages.push(um);S.cld=true;R();
  setTimeout(()=>document.getElementById("ce")?.scrollIntoView({block:"end"}),100);
  try{
    const rep=await ai(c.messages);
    c.messages.push({id:uid(),role:"assistant",content:rep,ts:Date.now()});
    if(rep.includes("סיכום קליני")||rep.includes("ממצא"))c.status="diagnosed";
  }catch(err){c.messages.push({id:uid(),role:"assistant",content:"⚠️ "+err.message,ts:Date.now()});}
  S.cld=false;saveS();R();
  setTimeout(()=>document.getElementById("ce")?.scrollIntoView({block:"end",behavior:"smooth"}),150);
};

window.deleteDoc=idx=>{
  if(!confirm("למחוק מסמך זה לצמיתות?"))return;
  S.profile.medDocs?.splice(idx,1);saveS();R();toast("🗑 נמחק");
};

window.setChip=s=>{S.ci=s;R();setTimeout(()=>{const ta=document.getElementById("cta");if(ta){ta.focus();ta.selectionStart=ta.selectionEnd=ta.value.length;}},60);};
window.aR=ta=>{ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,110)+"px";S.ci=ta.value;};
window.pickF=e=>{
  Array.from(e.target.files||[]).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      const b64=ev.target.result.split(",")[1];
      S.cf.push({name:f.name,type:f.type,data:b64});
      if(f.type.startsWith("image/"))S.cp.push(ev.target.result);
      else S.cp.push(null); // placeholder for PDF
      R();setTimeout(()=>document.getElementById("ce")?.scrollIntoView({block:"end"}),80);
    };
    r.readAsDataURL(f);
  });e.target.value="";
};
window.rmPrev=i=>{S.cf.splice(i,1);S.cp.splice(i,1);R();toast("הוסר");};
window.sendC=async()=>{
  const c=S.consults.find(x=>x.id===S.activeId);
  if(!c||S.cld)return;
  const txt=S.ci.trim();
  if(!txt&&!S.cf.length)return;
  const um={id:uid(),role:"user",content:txt||"אנא נתח את הקבצים המצורפים",files:[...S.cf],ts:Date.now()};
  c.messages.push(um);
  if(c.messages.length===1)c.title=(txt.slice(0,40)||"קבצים לניתוח");
  S.ci="";S.cf=[];S.cp=[];S.cld=true;R();
  setTimeout(()=>document.getElementById("ce")?.scrollIntoView({block:"end",behavior:"smooth"}),100);
  try{
    const rep=await ai(c.messages);
    c.messages.push({id:uid(),role:"assistant",content:rep,ts:Date.now()});
    if(rep.includes("סיכום קליני")||rep.includes("אבחנה ראשית")||rep.includes("הערכה קלינית")){c.aiDiagnosis=rep;c.status="diagnosed";}
  }catch(err){
    const isNoKey=err.message==="NO_KEY";
    c.messages.push({id:uid(),role:"assistant",content:isNoKey
      ?"🔑 נדרש מפתח API לפעולה.\n\nעבור להגדרות ⚙️ → הזן מפתח מ-console.anthropic.com"
      :"⚠️ שגיאה: "+err.message,ts:Date.now()});
  }
  S.cld=false;saveS();R();setTimeout(()=>document.getElementById("ce")?.scrollIntoView({block:"end",behavior:"smooth"}),150);
};
window.uP=(k,v)=>{S.profile[k]=v;};
window.svP=()=>{const b=document.getElementById("spb");if(b){b.textContent="✅ נשמר!";b.disabled=true;setTimeout(()=>{b.textContent="💾 שמור פרופיל";b.disabled=false;},2000);}saveS();toast("✅ פרופיל נשמר");};
window.setFT=t=>{S.ft=t;R();};
window.addTF=e=>{
  const f=e.target.files?.[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{const entry={id:uid(),name:f.name,type:f.type,data:ev.target.result.split(",")[1],uploadedAt:Date.now(),label:S.nt.name||f.name,date:S.nt.date,notes:S.nt.notes};if(!S.profile.uploadedTests)S.profile.uploadedTests=[];S.profile.uploadedTests.push(entry);S.nt={name:"",date:"",notes:""};saveS();R();toast("✅ בדיקה הועלתה");};
  r.readAsDataURL(f);e.target.value="";
};
window.rmT=i=>{if(confirm("למחוק בדיקה זו?")){S.profile.uploadedTests?.splice(i,1);saveS();R();}};
window.genSum=async()=>{
  S.gl=true;const b=document.getElementById("gsb");if(b)b.disabled=true;R();
  const p=S.profile;
  const txt=`שם: ${p.name||"?"} | גיל: ${p.age||"?"} | מין: ${p.gender||"?"} | סוג דם: ${p.bloodType||"לא ידוע"} | עישון: ${p.smoking||"?"}
מחלות רקע: ${p.conditions||"לא ידוע"}
תרופות קבועות: ${p.medications||"לא ידוע"}
אלרגיות: ${p.allergies||"לא ידוע"}
בדיקות שהועלו: ${(p.uploadedTests||[]).map(t=>(t.label||t.name)+(t.date?" ("+fD(t.date)+")":"")).join(", ")||"אין"}`;
  try{
    const sum=await ai([{role:"user",content:txt,files:(p.uploadedTests||[]).filter(t=>t.type?.startsWith("image/"))}],SYS_SUM);
    S.profile.aiSummary=sum;saveS();toast("✅ סיכום נוצר בהצלחה!");
  }catch(e){S.profile.aiSummary="שגיאה: "+e.message;toast("❌ שגיאה: "+e.message,3000);}
  S.gl=false;R();
};
window.selH=id=>{S.hSel=id;S.hTab="dx";S.dx={diagnosis:"",notes:""};R();};
window.setHT=t=>{S.hTab=t;R();};
window.gTC=id=>{S.activeId=id;S.view="consult";R();};
window.mD=id=>{const c=S.consults.find(x=>x.id===id);if(c){c.status="completed";saveS();R();toast("✅ ייעוץ הושלם");}};
window.svDX=id=>{const c=S.consults.find(x=>x.id===id);if(!c||!S.dx.diagnosis.trim())return;c.doctorDiagnosis={...S.dx,savedAt:Date.now()};c.status="diagnosed";saveS();R();toast("✅ אבחנה נשמרה");};
window.addM=id=>{const c=S.consults.find(x=>x.id===id);if(!c||!S.nm.name?.trim())return;if(!c.medications)c.medications=[];c.medications.push({id:uid(),...S.nm,active:true,taken:{}});S.nm={name:"",dose:"",freq:"",duration:""};saveS();R();toast("✅ תרופה נוספה");};
window.tMD=(cid,mid,day)=>{const c=S.consults.find(x=>x.id===cid);const m=c?.medications?.find(x=>x.id===mid);if(m){if(!m.taken)m.taken={};m.taken[day]=!m.taken[day];saveS();R();}};
window.tMA=(cid,mid)=>{const c=S.consults.find(x=>x.id===cid);const m=c?.medications?.find(x=>x.id===mid);if(m){m.active=!m.active;saveS();R();}};
window.delM=(cid,mid)=>{if(confirm("למחוק תרופה זו?")){const c=S.consults.find(x=>x.id===cid);if(c){c.medications=c.medications?.filter(x=>x.id!==mid);saveS();R();}}};
window.addTst=id=>{const c=S.consults.find(x=>x.id===id);if(!c||!S.ntst.name?.trim())return;if(!c.tests)c.tests=[];c.tests.push({id:uid(),...S.ntst,status:"pending"});S.ntst={name:"",date:"",notes:""};saveS();R();toast("✅ בדיקה נוספה");};
window.tTst=(cid,tid)=>{const c=S.consults.find(x=>x.id===cid);const t=c?.tests?.find(x=>x.id===tid);if(t){t.status=t.status==="done"?"pending":"done";saveS();R();}};
window.addF=id=>{const c=S.consults.find(x=>x.id===id);if(!c||!S.nf.date)return;if(!c.followUps)c.followUps=[];c.followUps.push({id:uid(),...S.nf,done:false});S.nf={date:"",note:""};saveS();R();toast("✅ ביקורת נוספה");};
window.tF=(cid,fid)=>{const c=S.consults.find(x=>x.id===cid);const f=c?.followUps?.find(x=>x.id===fid);if(f){f.done=!f.done;saveS();R();}};
window.delF=(cid,fid)=>{const c=S.consults.find(x=>x.id===cid);if(c){c.followUps=c.followUps?.filter(x=>x.id!==fid);saveS();R();}};
window.svKey=()=>{const k=S.sk.trim();if(!k)return;localStorage.setItem("dr_apikey",k);S.ss={ok:true,msg:"✅ מפתח נשמר בהצלחה!"};R();toast("✅ מפתח נשמר!");};
window.tstKey=async()=>{
  const key=(S.sk||"").trim()||localStorage.getItem("dr_apikey")||"";
  if(!key){S.ss={ok:false,msg:"❌ הזן מפתח API תחילה"};R();return;}
  S.sld=true;S.ss=null;R();
  try{
    const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL,max_tokens:30,messages:[{role:"user",content:"אמור שלום"}]})});
    const raw=await r.text();
    let d;try{d=JSON.parse(raw);}catch{S.ss={ok:false,msg:`❌ תגובה לא תקינה (${r.status}):\n${raw.slice(0,200)}`};S.sld=false;R();return;}
    if(d.content?.[0]?.text){S.ss={ok:true,msg:"✅ חיבור תקין!\nד\"ר קלוד: "+d.content[0].text};localStorage.setItem("dr_apikey",key);toast("✅ חיבור תקין!");}
    else S.ss={ok:false,msg:`❌ ${d.error?.message||JSON.stringify(d).slice(0,200)}`};
  }catch(e){S.ss={ok:false,msg:`❌ שגיאת רשת: ${e.message}`};}
  S.sld=false;R();
};
window.shareOrCopy=shareOrCopy;
window.copyText=copyText;

// ── INIT ──
loadS();
// Set default view to settings if no API key
if(!localStorage.getItem("dr_apikey"))S.view="settings";
R();
</script>
